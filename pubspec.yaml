name: fiscal_assistant
description: Assistente pessoal para fiscais de caixa - Gestão de escala em tempo real
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.8.3

  # Supabase
  supabase_flutter: ^2.0.0

  # HTTP
  http: ^1.2.0

  # Compartilhar
  share_plus: ^10.0.0

  # Assistente IA (Gemini)
  google_generative_ai: ^0.4.0
  flutter_markdown: ^0.7.5

  # Utils
  uuid: ^4.2.2
  equatable: ^2.0.5
  connectivity_plus: ^5.0.2
  flutter_dotenv: ^5.1.0
  intl: ^0.18.1

  # Notificações Locais
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  drift_dev: ^2.14.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
