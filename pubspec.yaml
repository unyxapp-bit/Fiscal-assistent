name: fiscal_assistant
description: Assistente pessoal para fiscais de caixa - GestÃ£o de escala em tempo real
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Supabase
  supabase_flutter: ^2.0.0

  # HTTP
  http: ^1.2.0

  # Compartilhar
  share_plus: ^10.0.0

  # CSV parsing
  csv: ^6.0.0

  # Utils
  uuid: ^4.2.2
  equatable: ^2.0.5
  connectivity_plus: ^5.0.2
  flutter_dotenv: ^5.1.0
  intl: ^0.18.1
  file_picker: ^8.1.2
  web: ^1.1.1
  # Armazenamento local
  shared_preferences: ^2.5.4

  # Notificações Locais
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

  # Balcão Fiscal — leitura de notificações do WhatsApp
  notification_listener_service: ^0.3.5

  # Cartazes Promocionais — captura e exportação
  screenshot: ^3.0.0
  pdf: ^3.11.1
  printing: ^5.13.4
  flutter_svg: ^2.2.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  drift_dev: ^2.14.1
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/ICONE.PNG.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#1A3A8F"
  adaptive_icon_foreground: "assets/icon/ICONE.PNG.jpeg"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/icon/
    - templates/

