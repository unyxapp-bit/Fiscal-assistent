name: Build & Release APK

on:
  workflow_dispatch: # desativado: disparar manualmente se necessário

# Permissão para criar Releases
permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. Baixar o código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Java 17 é obrigatório para o Android Gradle Plugin moderno
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Flutter (canal stable, com cache para acelerar builds futuros)
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Criar o .env a partir dos Secrets do repositório
      #    (Settings → Secrets and variables → Actions → New repository secret)
      - name: Criar arquivo .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

      # 5. Instalar dependências
      - name: flutter pub get
        run: flutter pub get

      # 6. Gerar código do banco de dados Drift
      - name: Gerar código Drift
        run: dart run build_runner build --delete-conflicting-outputs

      # 7. Compilar o APK em modo release
      - name: Compilar APK Release
        run: flutter build apk --release

      # 8. Calcular tag e nome do arquivo com data + short SHA
      - name: Preparar informações da versão
        id: info
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y.%m.%d')
          echo "tag=v${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "filename=FiscalAssistant-${DATE}-${SHORT_SHA}.apk" >> $GITHUB_OUTPUT

      # 9. Renomear o APK gerado
      - name: Renomear APK
        run: mv build/app/outputs/flutter-apk/app-release.apk "${{ steps.info.outputs.filename }}"

      # 10. Publicar Release no GitHub com o APK como anexo
      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: "Fiscal Assistant ${{ steps.info.outputs.tag }}"
          body: |
            ## Download

            Baixe o arquivo `.apk` abaixo e instale no seu celular Android.

            > **Como instalar:**
            > 1. Abra as **Configurações** do Android
            > 2. Vá em **Segurança** → **Instalar apps desconhecidos**
            > 3. Permita a instalação pelo seu gerenciador de arquivos
            > 4. Abra o `.apk` baixado e instale

            **Commit:** `${{ github.sha }}`
          files: ${{ steps.info.outputs.filename }}
          make_latest: true
